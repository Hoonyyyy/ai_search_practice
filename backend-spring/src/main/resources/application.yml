server:
  port: 8080

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  datasource:
    url: jdbc:h2:file:./data/ragsearch
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true        # http://localhost:8080/h2-console 로 DB 조회 가능
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update     # 앱 시작 시 스키마 자동 생성/업데이트
    show-sql: false
    properties:
      hibernate:
        format_sql: true

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

document:
  chunk-size: 500
  chunk-overlap: 50
  allowed-extensions: .pdf,.txt,.md

logging:
  level:
    com.ragsearch: DEBUG
