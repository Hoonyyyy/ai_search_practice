# ────────────────────────────────────────────────────────────
# Nginx 웹 서버 설정
#
# 역할이 두 가지다:
#   1. React 빌드 결과물(HTML/JS/CSS)을 브라우저에 서빙
#   2. /api/** 요청을 Spring Boot(8080)로 전달 (리버스 프록시)
#
# 덕분에 브라우저 입장에서는 모든 요청이 같은 서버(80 포트)로 가고,
# CORS 문제가 생기지 않는다.
# ────────────────────────────────────────────────────────────
server {
    listen 80;
    root /usr/share/nginx/html;  # React 빌드 파일 위치
    index index.html;

    # React 라우팅 지원
    # /about 같은 경로를 새로고침해도 index.html을 반환해서 React가 라우팅하게 한다.
    location / {
        try_files $uri /index.html;
    }

    # /api/** 요청 → Spring Boot 컨테이너(8080)로 전달
    location /api/ {
        proxy_pass http://backend-spring:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE(Server-Sent Events) 스트리밍 설정
        # 버퍼링을 끄지 않으면 Nginx가 응답을 모아뒀다가 한번에 보내서
        # 스트리밍이 동작하지 않는다.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }
}
